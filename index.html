<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER — title only
       ================================================================ -->
  <header class="launcher-header">
    <div class="header-left">
      <h1 id="greeting">Tab Out</h1>
      <div class="date" id="date">-</div>
    </div>
  </header>

  <!-- ================================================================
       APP LAUNCHER — every open link becomes a clickable app tile
       ================================================================ --> 
  <div class="dashboard-columns" id="dashboardColumns">
    <main class="launcher-shell">
      <div class="active-section" id="openTabsSection" style="display:none">
        <div class="missions" id="openTabsMissions"></div>
      </div>
    </main>

 
    <aside class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Saved for later</h2>
        <div class="section-line"></div>
        <span class="section-count" id="deferredCount"></span>
      </div>

      <div class="deferred-list" id="deferredList"></div>
      <div class="deferred-empty" id="deferredEmpty">Nothing saved yet.</div>

      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle" type="button">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
          <span>Archive</span>
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input class="archive-search" id="archiveSearch" type="search" placeholder="Search archive..." autocomplete="off">
          <div id="archiveList"></div>
        </div>
      </div>
    </aside>

  </div><!-- end .dashboard-columns -->

  <!-- ================================================================
       FOOTER — subtle attribution only
       ================================================================ -->
  <footer>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;"><a href="https://github.com/zarazhangrui/tab-out" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Tab Out</a> by <a href="https://x.com/zarazhangrui" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">Zara</a></span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<script src="config.local.js"></script>
<script src="flow-storage.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
