<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>卡片书签 - 管理</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h2>卡片书签</h2>
      <nav>
        <a href="#cards" class="nav-item active">全部卡片</a>
        <a href="#add" class="nav-item">添加书签</a>
      </nav>
    </aside>

    <main class="main">
      <section id="cards-section" class="section active">
        <div class="section-header">
          <h1>全部卡片</h1>
          <input type="text" id="search-input" placeholder="搜索...">
        </div>
        <div id="card-grid" class="card-grid"></div>
      </section>

      <section id="add-section" class="section">
        <h1>添加书签</h1>
        <form id="add-form">
          <div class="form-group">
            <label>网址</label>
            <input type="url" id="add-url" required placeholder="https://...">
          </div>
          <div class="form-group">
            <label>标题</label>
            <input type="text" id="add-title" required placeholder="页面标题">
          </div>
          <div class="form-group">
            <label>描述（可选）</label>
            <textarea id="add-desc" rows="3" placeholder="一句话描述..."></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
