<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Out</title>

  <!-- Google Fonts: Newsreader (for headings/numbers) + DM Sans (for body text) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER — title only
       ================================================================ -->
  <header class="launcher-header">
    <div class="header-left">
      <h1 id="greeting">Flow</h1>
      <div class="date" id="date">-</div>
    </div>

    <nav class="newtab-switcher" aria-label="New tab destination">
      <button class="newtab-switcher-option" type="button" data-action="open-custom-newtab" title="Open custom link">
        <span class="switcher-icon" aria-hidden="true">▣</span>
        <span data-custom-newtab-label>Custom</span>
      </button>
      <button class="newtab-switcher-edit" type="button" data-action="edit-custom-newtab" title="Customize custom URL" aria-label="Customize custom URL">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 20h4.2L19.1 9.1a2 2 0 0 0 0-2.8l-1.4-1.4a2 2 0 0 0-2.8 0L4 15.8V20Z"/>
          <path d="m13.5 6.5 4 4"/>
        </svg>
      </button>
      <button class="newtab-switcher-option is-active" type="button" data-action="open-tabout-page" title="Stay on Tab Out" aria-current="page">
        <span class="switcher-icon" aria-hidden="true">∞</span>
        <span>Tab Out</span>
      </button>
    </nav>
  </header>

  <div class="custom-newtab-modal" id="customNewTabModal" hidden>
    <form class="custom-newtab-panel" id="customNewTabForm">
      <div class="custom-newtab-panel-header">
        <div>
          <h2>Custom URL</h2>
          <p>Set the left switcher button.</p>
        </div>
        <button class="custom-newtab-close" type="button" data-action="cancel-custom-newtab" aria-label="Close custom URL settings">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 6 12 12M18 6 6 18"/>
          </svg>
        </button>
      </div>

      <label class="custom-newtab-field">
        <span>Name</span>
        <input id="customNewTabLabelInput" type="text" autocomplete="off" placeholder="Tobooks">
      </label>

      <label class="custom-newtab-field">
        <span>URL</span>
        <input id="customNewTabUrlInput" type="url" autocomplete="off" placeholder="https://tobooks.xin/tobooks-main/">
      </label>

      <div class="custom-newtab-error" id="customNewTabError" role="alert"></div>

      <div class="custom-newtab-actions">
        <button class="custom-newtab-secondary" type="button" data-action="cancel-custom-newtab">Cancel</button>
        <button class="custom-newtab-primary" type="submit">Save</button>
      </div>
    </form>
  </div>

  <!-- ================================================================
       APP LAUNCHER — every open link becomes a clickable app tile
       ================================================================ --> 
  <div class="dashboard-columns" id="dashboardColumns">
    <main class="launcher-shell">
      <div class="active-section" id="openTabsSection" style="display:none">
        <div class="missions" id="openTabsMissions"></div>
      </div>
    </main>

 
    <aside class="deferred-column" id="deferredColumn" style="display:none">
      <div class="section-header">
        <h2>Flow</h2>
        <div class="section-line"></div>
        <span class="section-count" id="deferredCount"></span>
      </div>

      <div class="deferred-list" id="deferredList"></div>
      <div class="deferred-empty" id="deferredEmpty">Nothing in Flow yet.</div>

      <div class="deferred-archive" id="deferredArchive" style="display:none">
        <button class="archive-toggle" id="archiveToggle" type="button">
          <svg class="archive-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
          <span>Archive</span>
          <span class="archive-count" id="archiveCount"></span>
        </button>
        <div class="archive-body" id="archiveBody" style="display:none">
          <input class="archive-search" id="archiveSearch" type="search" placeholder="Search archive..." autocomplete="off">
          <div id="archiveList"></div>
        </div>
      </div>
    </aside>

  </div><!-- end .dashboard-columns -->

</div><!-- end .container -->

<!-- ================================================================
     TOAST — floats above everything, used for action confirmations
     Hidden by default via CSS (opacity:0, translateY)
     ================================================================ -->
<div class="toast" id="toast">
  <!-- Checkmark circle icon (Heroicons outline) -->
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- Personal config — defines LOCAL_LANDING_PAGE_PATTERNS etc. -->
<script src="config.local.js"></script>
<script src="flow-storage.js"></script>

<!-- Main dashboard logic — loads last so the DOM is ready -->
<script src="app.js"></script>
</body>
</html>
